<!DOCTYPE html>
<html>
<head>

<title>SmartCart AI Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f4c81,#1e90ff);
}

/* NAVBAR */

.navbar{
background:#1c1c1c;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#f5c518;
font-size:22px;
font-weight:bold;
}

.nav-links a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* CONTENT */

.container{
padding:40px;
}

.welcome{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
margin-bottom:30px;
}

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CHAT BUTTON */

.chat-toggle{
position:fixed;
bottom:20px;
right:20px;
background:#007bff;
color:white;
border:none;
padding:12px 18px;
border-radius:25px;
cursor:pointer;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* CHATBOT */

.chatbot{
position:fixed;
right:20px;
bottom:80px;
width:320px;
height:420px;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
}

.chat-header{
background:#007bff;
color:white;
padding:10px;
font-weight:bold;
}

.chat-body{
flex:1;
padding:10px;
overflow-y:auto;
background:#f5f5f5;
}

.bot{
background:white;
padding:8px;
border-radius:8px;
margin-bottom:8px;
}

.user{
background:#007bff;
color:white;
padding:8px;
border-radius:8px;
margin-bottom:8px;
text-align:right;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
border:none;
padding:10px;
outline:none;
}

.chat-input button{
background:#007bff;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">SmartCart AI</div>

<div class="nav-links">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/logout">Logout</a>
</div>

</div>


<!-- DASHBOARD -->

<div class="container">

<div class="welcome">

<h1>Welcome {{user}}</h1>

<p>Your SmartCart AI Dashboard</p>

</div>


<div class="cards">

<div class="card">

<h2>{{total_orders}}</h2>

<p>Total Orders</p>

</div>


<div class="card">

<h2>₹ {{total_spending}}</h2>

<p>Total Spending</p>

</div>

</div>

</div>


<!-- CHAT BUTTON -->

<button class="chat-toggle" onclick="toggleChat()">
💬 AI Help
</button>


<!-- CHATBOT -->

<div class="chatbot" id="chatbot">

<div class="chat-header">

SmartCart AI Assistant

</div>

<div class="chat-body" id="chat-body">

<div class="bot">

Hello 👋 I am SmartCart AI assistant. Ask me to recommend products.

</div>

</div>

<div class="chat-input">

<input type="text" id="message" placeholder="Ask AI..." />

<button onclick="sendMessage()">Send</button>

</div>

</div>


<script>

/* OPEN CLOSE CHAT */

function toggleChat(){

let chat = document.getElementById("chatbot");

if(chat.style.display==="flex"){

chat.style.display="none";

}else{

chat.style.display="flex";

}

}


/* SEND MESSAGE */

function sendMessage(){

let msg=document.getElementById("message").value;

let chatBody=document.getElementById("chat-body");

chatBody.innerHTML+=`<div class="user">${msg}</div>`;

fetch("/chatbot",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:msg})

})

.then(res=>res.json())

.then(data=>{

chatBody.innerHTML+=`<div class="bot">${data.reply}</div>`;

chatBody.scrollTop=chatBody.scrollHeight;

});

document.getElementById("message").value="";

}

</script>

</body>

</html>
